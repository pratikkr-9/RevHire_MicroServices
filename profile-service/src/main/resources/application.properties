server.port=8084
spring.application.name=profile-service

spring.datasource.url=jdbc:mysql://localhost:3306/revhire_profile_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Kumar@11
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
file.upload-dir=./uploads

auth.service.url=http://localhost:8081

logging.level.com.revhire=DEBUG

# ── Eureka Service Discovery ───────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Resilience4j Circuit Breaker (inter-service calls) ────────────────────
resilience4j.circuitbreaker.instances.default.slidingWindowSize=10
resilience4j.circuitbreaker.instances.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.default.failureRateThreshold=50
resilience4j.circuitbreaker.instances.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.default.automaticTransitionFromOpenToHalfOpenEnabled=true

# ── OpenFeign configuration ───────────────────────────────────────────────
spring.cloud.openfeign.circuitbreaker.enabled=false

# Eureka Client Configuration

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.profileService.register-health-indicator=true
resilience4j.circuitbreaker.instances.profileService.sliding-window-size=10
resilience4j.circuitbreaker.instances.profileService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.profileService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.profileService.permitted-number-of-calls-in-half-open-state=3

